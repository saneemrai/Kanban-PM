<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Management MVP</title>
    <style>
      :root {
        --accent-yellow: #ecad0a;
        --primary-blue: #209dd7;
        --secondary-purple: #753991;
        --navy-dark: #032147;
        --gray-text: #888888;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f8fb;
        color: var(--navy-dark);
        font-family: Arial, sans-serif;
      }

      main {
        width: min(680px, calc(100% - 32px));
        border-top: 6px solid var(--accent-yellow);
        background: white;
        padding: 32px;
        box-shadow: 0 18px 40px rgba(3, 33, 71, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0;
        color: var(--gray-text);
        line-height: 1.6;
      }

      a {
        color: var(--primary-blue);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Project Management MVP</h1>
      <p>
        FastAPI is serving this temporary static page. The health API is
        available at <a href="/api/health">/api/health</a>.
      </p>
    </main>
  </body>
</html>
